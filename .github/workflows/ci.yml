name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MERCURY_NO_COLOR: "1"
  NO_COLOR: "1"
  COLUMNS: "120"
  MERCURY_DRY_RUN: "1"
  MERCURY_LIVE_ACTIONS: "0"
  TZ: UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[mariadb,dev]"

      - name: Check package metadata
        run: python -m pip check

      - name: Build distribution artifacts
        run: python -m build

      - name: Run tests
        run: python -m pytest -q
        env:
          # Force offline local.toml even if a future checkout ever ships one.
          MERCURY_LOCAL_CONFIG: ${{ runner.temp }}/mercury-ci-absent-local.toml

      - name: Smoke test CLI entrypoints
        run: |
          python -m mercury.cli --help
          python -m mercury.cli backup --help
          python -m mercury.cli sync --help
          python -m mercury.cli repo --help
          python -m mercury.cli transfer --help
