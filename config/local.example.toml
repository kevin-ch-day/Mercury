# Copy to config/local.toml for local overrides (gitignored).

# --- Storage roles (C1–C2 models; writers still use [mercury] paths until cutover) ---
# Before cutover: active_write_role = "legacy" (USB is transition_source, writable).
# After verified cutover: active_write_role = "primary", legacy role = legacy_archive.
#
# Env overrides (preferred):
#   MERCURY_PRIMARY_MOUNT, MERCURY_LEGACY_MOUNT, MERCURY_BACKUP_ROOT
# Deprecated (USB / transitional only — never overrides primary after cutover):
#   MERCURY_USB_MOUNT
#
# Operator fstab draft for primary (do not apply automatically):
# UUID=715f29a9-2671-477b-8c8d-515d190addb9 /mnt/MERCURY_DATA_V2 ext4 defaults,nofail,x-systemd.device-timeout=10s 0 2

[storage]
active_write_role = "legacy"
migration_state = "not_started"
# cutover_complete is derived from migration_state; optional compatibility boolean only.

[storage.primary]
role = "canonical"
label = "MERCURY_DATA_V2"
mount_path = "/mnt/MERCURY_DATA_V2"
filesystem_uuid = "715f29a9-2671-477b-8c8d-515d190addb9"
filesystem_type = "ext4"
writable = true

[storage.legacy]
# Until cutover this is the active writer (transition_source), not a read-only archive.
role = "transition_source"
label = "MERCURY_DATA_USB"
mount_path = "/mnt/MERCURY_DATA_USB"
filesystem_uuid = "e4f0c7fb-132e-4867-9c16-5e4749f5c43a"
filesystem_type = "ext4"
writable = true

[storage.space_policy]
# reserve = max(minimum_free_bytes, minimum_free_percent of capacity)
minimum_free_bytes = 21474836480
minimum_free_percent = 10

[mercury]
mode = "seed"
# Fedora example: /var/backups/mercury
# Stable USB mount example: /mnt/MERCURY_DATA_USB/mercury_backups (Linux)
# Windows example: usb_mount = "E:/MERCURY_DATA_USB" then paths like E:/MERCURY_DATA_USB/mercury_backups
# usb_mount = "E:/MERCURY_DATA_USB"
# Flat paths below remain the live backup destination until storage cutover (option B).
backup_root = "/mnt/MERCURY_DATA_USB/mercury_backups"
dry_run = true
# Gate for sync/deploy/restore (not required for backup writes)
live_actions_enabled = false
repo_backup_root = "/mnt/MERCURY_DATA_USB/mercury_repo_backups"
manifest_dir = "/mnt/MERCURY_DATA_USB/mercury_manifests"
runbook_dir = "/mnt/MERCURY_DATA_USB/mercury_runbooks"

# File logging under logs/
#   mercury-YYYY-MM-DD.log  — general session/operation log
#   error.log               — errors and failed sessions (ERROR+)
#   database.log            — mercury.database events (discovery, probe, etc.)
#   backup.log              — mercury.backup events (backup, verify, restore-check)
logging_enabled = true
log_level = "INFO"
# Operator-storage example: /mnt/MERCURY_DATA_USB/mercury_logs (legacy until cutover)
log_dir = "/mnt/MERCURY_DATA_USB/mercury_logs"

# --- Option A: TCP + password (production / remote server) ---
# [mariadb]
# host = "127.0.0.1"
# port = 3306
# user = "mercury_readonly"
# password_env = "MERCURY_MARIADB_PASSWORD"
# connect_timeout = 10
# ssl_disabled = true

# --- Option B: Local Fedora socket via mariadb CLI (no password) ---
# Uses mariadb/mysql on PATH with unix_socket auth (e.g. root@localhost).
[mariadb]
host = "127.0.0.1"
port = 3306
user = "root"
use_client = true
unix_socket = "/var/lib/mysql/mysql.sock"
connect_timeout = 10
ssl_disabled = true
