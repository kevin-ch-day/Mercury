# Copy to config/local.toml for local overrides (gitignored).

[mercury]
mode = "seed"
# Fedora example: /var/backups/mercury
# Stable USB mount example: /mnt/MERCURY_DATA_USB/mercury_backups (Linux)
# Windows example: usb_mount = "E:/MERCURY_DATA_USB" then paths like E:/MERCURY_DATA_USB/mercury_backups
# usb_mount = "E:/MERCURY_DATA_USB"
backup_root = "/mnt/MERCURY_DATA_USB/mercury_backups"
dry_run = true
# Explicit gate for mariadb-dump execution and backup file writes
live_actions_enabled = false
repo_backup_root = "/mnt/MERCURY_DATA_USB/mercury_repo_backups"
manifest_dir = "/mnt/MERCURY_DATA_USB/mercury_manifests"
runbook_dir = "/mnt/MERCURY_DATA_USB/mercury_runbooks"

# File logging under logs/
#   mercury-YYYY-MM-DD.log  — general session/operation log
#   error.log               — errors and failed sessions (ERROR+)
#   database.log            — mercury.database events (discovery, probe, etc.)
#   backup.log              — mercury.backup events (backup, verify, restore-check)
logging_enabled = true
log_level = "INFO"
# USB-mounted example: /mnt/MERCURY_DATA_USB/mercury_logs
log_dir = "/mnt/MERCURY_DATA_USB/mercury_logs"

# --- Option A: TCP + password (production / remote server) ---
# [mariadb]
# host = "127.0.0.1"
# port = 3306
# user = "mercury_readonly"
# password_env = "MERCURY_MARIADB_PASSWORD"
# connect_timeout = 10
# ssl_disabled = true

# --- Option B: Local Fedora socket via mariadb CLI (no password) ---
# Uses mariadb/mysql on PATH with unix_socket auth (e.g. root@localhost).
[mariadb]
host = "127.0.0.1"
port = 3306
user = "root"
use_client = true
unix_socket = "/var/lib/mysql/mysql.sock"
connect_timeout = 10
ssl_disabled = true
