# Copy to config/databases.toml and adjust for your environment.
# Mercury reads names (and optional host/port) only — no live connection in seed mode.

[databases]
# Production (active backup sources for the current Mercury milestone)
erebus_threat_intel_prod = { host = "localhost", port = 3306 }
scytaledroid_core_prod = { host = "localhost", port = 3306 }
obsidiandroid_core_prod = { host = "localhost", port = 3306 }

# Development (never backup sources)
erebus_threat_intel_dev = { host = "localhost", port = 3306 }
scytaledroid_core_dev = { host = "localhost", port = 3306 }

# Shared authority
android_permission_intel = { host = "localhost", port = 3306 }

# Restore-check temp databases are created dynamically by Mercury.
# Do not pre-list dated _restorecheck_* names here.
